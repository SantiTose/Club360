{% extends "base.html" %}

{% block title %}Turnos Disponibles - Club 360{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/main.min.css">
{% endblock %}

{% block content %}
<h2>Turnos Disponibles</h2>

<div class="filters">
    <form method="GET" class="form-inline">
        <select name="actividad" class="form-control">
            <option value="">Todas las actividades</option>
            <option value="futbol" {% if filtro_actividad == 'futbol' %}selected{% endif %}>Fútbol</option>
            <option value="basquet" {% if filtro_actividad == 'basquet' %}selected{% endif %}>Básquet</option>
            <option value="voley" {% if filtro_actividad == 'voley' %}selected{% endif %}>Vóley</option>
            <option value="padel" {% if filtro_actividad == 'padel' %}selected{% endif %}>Pádel</option>
        </select>
        <select name="tipo_clase" class="form-control">
            <option value="">Todos los tipos</option>
            <option value="abonada" {% if filtro_tipo_clase == 'abonada' %}selected{% endif %}>Abonada</option>
            <option value="no_abonada" {% if filtro_tipo_clase == 'no_abonada' %}selected{% endif %}>No abonada</option>
        </select>
        <button type="submit" class="btn btn-secondary">Filtrar</button>
    </form>
</div>

<div class="calendar-layout">
    <div id="calendar-disponibles" class="calendar-surface"></div>
    <div class="turno-card" id="detalle-turno" style="max-width: 420px;">
        <h3>Detalle</h3>
        <p class="text-muted">Seleccioná un turno del calendario para reservar.</p>
        <div id="detalle-turno-body"></div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const actividad = document.querySelector('select[name="actividad"]').value;
    const tipoClase = document.querySelector('select[name="tipo_clase"]').value;
    const calendarEl = document.getElementById('calendar-disponibles');
    const detalleEl = document.getElementById('detalle-turno-body');

    const calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'timeGridWeek',
        locale: 'es',
        firstDay: 1,
        hiddenDays: [0],
        dayHeaderFormat: { weekday: 'short', day: '2-digit', month: '2-digit' },
        slotLabelFormat: { hour: '2-digit', minute: '2-digit', hour12: false },
        slotMinTime: '08:00:00',
        slotMaxTime: '22:00:00',
        allDaySlot: false,
        height: 'auto',
        nowIndicator: true,
        events: `{{ url_for('turnos.eventos_turnos') }}?scope=disponibles&actividad=${encodeURIComponent(actividad)}&tipo_clase=${encodeURIComponent(tipoClase)}`,
        eventClick: function(info) {
            const p = info.event.extendedProps;
            const canReserve = !p.sin_cupos;
            const boton = canReserve
                ? `<form method="POST" action="${p.reservar_url}"><button type="submit" class="btn btn-success">Reservar</button></form>`
                : '<p class="text-warning">Sin cupos disponibles</p>';

            detalleEl.innerHTML = `
                <p><strong>Deporte:</strong> ${info.event.title}</p>
                <p><strong>Clase:</strong> ${p.tipo_clase}</p>
                <p><strong>Inicio:</strong> ${info.event.start.toLocaleString('es-AR')}</p>
                <p><strong>Fin:</strong> ${info.event.end.toLocaleString('es-AR')}</p>
                <p><strong>Cupos:</strong> ${p.cupos}</p>
                ${boton}
            `;
        }
    });

    calendar.render();
});
</script>
{% endblock %}
