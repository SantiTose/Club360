{% extends "base.html" %}

{% block title %}Escanear QR - Club 360{% endblock %}

{% block content %}
<h2>Validar Asistencia (QR)</h2>
<p class="text-muted">Ingresá el token QR recibido por correo para confirmar asistencia presencial.</p>

<form method="POST" class="form" style="max-width: 600px;">
    <div class="form-group">
        <label for="qr_token">Token QR</label>
        <input id="qr_token" name="qr_token" class="form-control" required placeholder="Ej: abcDEF...">
    </div>

    <div class="button-group" style="justify-content: flex-start;">
        <button type="submit" class="btn btn-success">Validar</button>
        <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Volver</a>
    </div>
</form>
{% endblock %}
