{% extends "base.html" %}

{% block title %}Pagar - Club 360{% endblock %}

{% block content %}
<h2>Realizar Pago</h2>

<div class="payment-container">
    <div class="payment-card">
        <h3>Monto a Pagar: ${{ "%.2f"|format(pago.monto) }}</h3>
        <p class="form-text">Este pago online se procesa exclusivamente con tarjeta de crédito.</p>
        
        <form method="POST" class="form">
            <button type="submit" class="btn btn-success">Pagar con Tarjeta de Crédito</button>
            <a href="{{ url_for('pagos.ver_deuda') }}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
