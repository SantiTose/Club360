<!DOCTYPE html>
<html>
<head>
    <style>
        /* Test 1: Basic */
        .test1 {
            color: #1f2937;
            background: #ffffff;
            padding: 10px;
            margin: 10px;
            border: 1px solid #000;
        }
        
        /* Test 2: With !important */
        .test2 {
            color: #1f2937 !important;
            background: #ffffff !important;
            padding: 10px;
            margin: 10px;
            border: 1px solid #000;
        }
    </style>
</head>
<body>
    <h1>CSS Color Test</h1>
    
    <label>Test 1 - Input básico:</label>
    <input type="text" class="test1" value="Puedo ver esto?">
    
    <label>Test 2 - Input con !important:</label>
    <input type="text" class="test2" value="Puedo ver esto?">
    
    <p style="color: #1f2937; background: #ffffff;">Texto de control (debería verse oscuro sobre blanco)</p>
</body>
</html>
